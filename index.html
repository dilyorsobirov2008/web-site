<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tasanno — Premium Electronics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--bg2:#111;--card:#161616;--card2:#1C1C1C;--card3:#222;
  --border:#252525;--border2:#2E2E2E;
  --gold:#D4AF37;--gold2:#F0CC5A;--gold3:#B8941E;
  --gold-glow:rgba(212,175,55,.15);--gold-dim:rgba(212,175,55,.08);
  --text:#F2EFE9;--text2:#A09A8E;--text3:#5C5650;
  --red:#E8453C;--green:#27AE60;--blue:#2E86DE;
  --r:10px;--r2:14px;--sh:0 4px 24px rgba(0,0,0,.6);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
h1,h2,h3,.serif{font-family:'Playfair Display',serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold3)}
button,input,select,textarea{font-family:'Outfit',sans-serif}

/* TOP BAR */
.topbar{background:#080808;border-bottom:1px solid var(--border);height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;font-size:.78rem;color:var(--text2)}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:1.6rem}
.topbar a,.topbar span,.topbar button{color:var(--text2);text-decoration:none;cursor:pointer;transition:color .2s;display:flex;align-items:center;gap:.3rem;background:none;border:none;font-size:.78rem;white-space:nowrap}
.topbar a:hover,.topbar span:hover{color:var(--gold)}
.phone{color:var(--gold)!important;font-weight:700;font-size:.86rem}
.lang-sw{display:flex;align-items:center;background:var(--card2);border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.lb{background:none;border:none;padding:.2rem .55rem;font-size:.74rem;font-weight:700;color:var(--text3);cursor:pointer;transition:all .2s;letter-spacing:.06em}
.lb.on{background:var(--gold);color:#0A0A0A}

/* NAVBAR */
.navbar{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.nbi{max-width:1380px;margin:0 auto;display:flex;align-items:center;gap:1rem;padding:.85rem 1.5rem}
.brand{font-family:'Playfair Display',serif;font-size:1.85rem;font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0;cursor:pointer;filter:drop-shadow(0 0 16px rgba(212,175,55,.25))}
.cat-btn{display:flex;align-items:center;gap:.5rem;background:var(--gold);color:#0A0A0A;border:none;padding:.65rem 1.2rem;border-radius:var(--r);font-size:.9rem;font-weight:700;cursor:pointer;transition:all .22s;white-space:nowrap;flex-shrink:0}
.cat-btn:hover{background:var(--gold2);transform:translateY(-1px)}
.sw{flex:1;position:relative;max-width:680px}
.si{width:100%;background:var(--card);border:1.5px solid var(--border2);color:var(--text);padding:.7rem 3rem .7rem 1.1rem;border-radius:var(--r);font-size:.9rem;outline:none;transition:border-color .2s,background .2s}
.si:focus{border-color:var(--gold);background:var(--card2)}
.si::placeholder{color:var(--text3)}
.sb{position:absolute;right:0;top:0;bottom:0;background:var(--gold);border:none;padding:0 1rem;border-radius:0 var(--r) var(--r) 0;cursor:pointer;color:#0A0A0A;font-size:1rem;transition:background .2s}
.sb:hover{background:var(--gold2)}
.navacts{display:flex;align-items:center;gap:.2rem;margin-left:auto;flex-shrink:0}
.na{display:flex;flex-direction:column;align-items:center;background:none;border:none;color:var(--text2);padding:.4rem .65rem;border-radius:8px;cursor:pointer;transition:all .2s;font-size:.72rem;gap:.18rem;position:relative;white-space:nowrap}
.na:hover{color:var(--gold);background:var(--gold-dim)}
.na .ni{font-size:1.2rem}
.nbadge{position:absolute;top:2px;right:5px;background:var(--gold);color:#0A0A0A;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:800;border:2px solid var(--bg2)}

/* NAV2 */
.nav2{background:var(--card);border-bottom:1px solid var(--border)}
.nav2i{max-width:1380px;margin:0 auto;display:flex;padding:0 1.5rem;overflow-x:auto}
.nav2i::-webkit-scrollbar{display:none}
.n2l{background:none;border:none;color:var(--text2);padding:.7rem 1rem;font-size:.83rem;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:.4rem}
.n2l:hover,.n2l.on{color:var(--gold);border-bottom-color:var(--gold)}

/* MAIN */
.main{max-width:1380px;margin:0 auto;padding:1.5rem}

/* HERO */
.hero-sec{display:grid;grid-template-columns:1fr 330px;gap:1.2rem;margin-bottom:2rem}
.hslider{position:relative;border-radius:var(--r2);overflow:hidden;background:var(--card);border:1px solid var(--border);min-height:380px}
.hslide{position:absolute;inset:0;display:flex;align-items:center;padding:2.5rem 3rem;opacity:0;transition:opacity .5s;pointer-events:none}
.hslide.on{opacity:1;pointer-events:all}
.hsbg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.15}
.hsc{position:relative;z-index:1;max-width:360px}
.stag{display:inline-block;background:var(--gold);color:#0A0A0A;padding:.25rem .8rem;border-radius:4px;font-size:.74rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem}
.stitle{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.5vw,2.9rem);font-weight:900;line-height:1.05;margin-bottom:.7rem}
.stitle .ac{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ssub{color:var(--text2);font-size:.98rem;margin-bottom:.5rem;font-weight:300}
.sprice{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;color:var(--gold);margin-bottom:1.3rem}
.simg{position:absolute;right:2rem;bottom:0;top:0;width:44%;object-fit:contain;filter:drop-shadow(0 8px 32px rgba(212,175,55,.12));transition:transform .4s}
.hslide.on .simg{transform:translateY(-6px)}
.sdots{position:absolute;bottom:1.1rem;left:2.5rem;display:flex;gap:.5rem;z-index:10}
.sdot{width:22px;height:4px;border-radius:2px;background:var(--border2);border:none;cursor:pointer;transition:all .3s;padding:0}
.sdot.on{background:var(--gold);width:34px}
.sarr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(22,22,22,.85);border:1px solid var(--border2);color:var(--text2);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;z-index:10;font-size:1.1rem;backdrop-filter:blur(4px)}
.sarr:hover{background:var(--gold);color:#0A0A0A;border-color:var(--gold)}
.sarr.prv{left:1rem}.sarr.nxt{right:1rem}

/* HERO SIDE */
.hside{display:flex;flex-direction:column;gap:1.1rem}
.hscard{flex:1;border-radius:var(--r2);border:1px solid var(--border);background:var(--card);padding:1.3rem;position:relative;overflow:hidden;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;justify-content:flex-end;min-height:164px}
.hscard:hover{border-color:rgba(212,175,55,.3);transform:translateY(-2px)}
.hsbg2{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.1}
.hsimg{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);width:96px;height:96px;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
.hscont{position:relative;z-index:1}
.hstag{font-size:.7rem;color:var(--gold);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.25rem}
.hstitle{font-size:1.05rem;font-weight:700;line-height:1.2;margin-bottom:.25rem}
.hsprice{font-size:.92rem;color:var(--gold);font-weight:600}

/* CATEGORIES */
.cats-sec{margin-bottom:2rem}
.catsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.8rem}
.catcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.1rem .8rem .85rem;display:flex;flex-direction:column;align-items:center;gap:.55rem;cursor:pointer;transition:all .25s;text-align:center}
.catcard:hover,.catcard.on{border-color:rgba(212,175,55,.4);background:var(--card2);transform:translateY(-3px);box-shadow:0 8px 24px rgba(212,175,55,.07)}
.cico{width:56px;height:56px;border-radius:50%;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:1px solid var(--border2);transition:all .25s}
.catcard:hover .cico,.catcard.on .cico{background:var(--gold-dim);border-color:rgba(212,175,55,.3)}
.cname{font-size:.77rem;font-weight:500;color:var(--text2);line-height:1.3;transition:color .2s}
.catcard:hover .cname,.catcard.on .cname{color:var(--gold)}

/* SECTION HDR */
.shdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.8rem}
.stit{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;letter-spacing:-.01em}
.sall{background:none;border:1px solid var(--border2);color:var(--text2);padding:.4rem 1rem;border-radius:6px;font-size:.82rem;cursor:pointer;transition:all .2s}
.sall:hover{border-color:var(--gold);color:var(--gold)}

/* PRODUCT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:1rem}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .28s;position:relative;display:flex;flex-direction:column}
.pcard:hover{border-color:rgba(212,175,55,.35);transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.55)}
.pimgw{position:relative;background:var(--card2);padding:1.4rem 1rem 1rem;overflow:hidden}
.pimg{width:100%;aspect-ratio:1;object-fit:contain;transition:transform .4s}
.pcard:hover .pimg{transform:scale(1.07)}
.pbadge{position:absolute;top:.65rem;left:.65rem;padding:.18rem .52rem;border-radius:5px;font-size:.69rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.bnew{background:var(--gold);color:#0A0A0A}
.bhot{background:var(--red);color:#fff}
.bsale{background:var(--green);color:#fff}
.pwish{position:absolute;top:.6rem;right:.6rem;background:var(--card3);border:1px solid var(--border2);border-radius:50%;width:29px;height:29px;display:flex;align-items:center;justify-content:center;font-size:.88rem;cursor:pointer;transition:all .2s;color:var(--text3)}
.pwish:hover{border-color:var(--red);color:var(--red)}
.pwish.on{color:var(--red);border-color:var(--red)}
.inst{position:absolute;bottom:.5rem;left:.65rem;background:var(--blue);color:#fff;border-radius:50px;font-size:.64rem;font-weight:700;padding:.16rem .52rem;letter-spacing:.04em}
.pinfo{padding:.9rem 1rem 1rem;flex:1;display:flex;flex-direction:column}
.pcat{font-size:.69rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem}
.pname{font-size:.87rem;font-weight:500;line-height:1.4;color:var(--text);margin-bottom:.65rem;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ppricew{margin-bottom:.85rem}
.pprice{font-family:'Playfair Display',serif;font-size:1.18rem;font-weight:700;color:var(--gold)}
.pcur{font-family:'Outfit',sans-serif;font-size:.71rem;font-weight:400;color:var(--text2);margin-left:.18rem}
.pold{font-size:.77rem;color:var(--text3);text-decoration:line-through;margin-top:.08rem}
.pacts{display:flex;gap:.55rem}
.bcart{flex:1;background:var(--gold-dim);border:1px solid rgba(212,175,55,.2);color:var(--gold);padding:.55rem .4rem;border-radius:8px;font-size:.79rem;font-weight:600;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:.3rem}
.bcart:hover{background:rgba(212,175,55,.17);border-color:var(--gold)}
.bbuy{flex:1;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#0A0A0A;padding:.55rem .4rem;border-radius:8px;font-size:.79rem;font-weight:700;cursor:pointer;transition:all .22s}
.bbuy:hover{opacity:.87;transform:translateY(-1px)}

/* PROMO */
.promogrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.2rem;margin:2rem 0}
.promocard{border-radius:var(--r2);border:1px solid var(--border);background:var(--card);padding:1.4rem;position:relative;overflow:hidden;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;justify-content:flex-end;min-height:155px}
.promocard:hover{border-color:rgba(212,175,55,.3);transform:translateY(-3px)}
.promobg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.1}
.promoimg{position:absolute;right:.8rem;bottom:0;top:50%;transform:translateY(-50%);height:105px;width:auto;object-fit:contain;filter:drop-shadow(0 4px 20px rgba(0,0,0,.5))}
.promocont{position:relative;z-index:1}
.promosub{font-size:.71rem;color:var(--gold);font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.28rem}
.prototitle{font-size:1rem;font-weight:700;margin-bottom:.3rem;line-height:1.2}
.proprice{font-size:.88rem;color:var(--gold);font-weight:600}

/* DEALS TIMER */
.dhead{display:flex;align-items:center;gap:1.4rem;margin-bottom:1.2rem;flex-wrap:wrap}
.twrap{display:flex;align-items:center;gap:.45rem}
.tlbl{font-size:.78rem;color:var(--text2)}
.tblk{background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:.28rem .52rem;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--gold);min-width:34px;text-align:center}
.tsep{color:var(--text3);font-weight:700}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fdi .18s}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.mo{background:var(--card);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:sui .22s}
@keyframes sui{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.moh{padding:1.35rem 1.6rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
.mot{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.mox{background:var(--card2);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:50%;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.mox:hover{background:var(--red);border-color:var(--red);color:#fff}
.mob{padding:1.4rem 1.6rem}

/* FORMS */
.fg{margin-bottom:1rem}
.fl{display:block;font-size:.79rem;color:var(--text2);margin-bottom:.38rem;letter-spacing:.03em;font-weight:500}
.fi{width:100%;background:var(--bg2);border:1.5px solid var(--border2);color:var(--text);padding:.7rem .95rem;border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--text3)}
textarea.fi{resize:vertical;min-height:75px}
select.fi{cursor:pointer;appearance:none}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

/* BUTTONS */
.bpri{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#0A0A0A;padding:.8rem 1.8rem;border-radius:9px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .22s;box-shadow:0 4px 20px rgba(212,175,55,.18)}
.bpri:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,175,55,.3)}
.bout{background:none;border:1.5px solid var(--border2);color:var(--text2);padding:.76rem 1.4rem;border-radius:9px;font-size:.87rem;font-weight:500;cursor:pointer;transition:all .22s}
.bout:hover{border-color:var(--gold);color:var(--gold)}

/* CART */
.citem{display:flex;align-items:center;gap:.85rem;padding:.95rem 0;border-bottom:1px solid var(--border)}
.citem:last-child{border-bottom:none}
.cimg{width:66px;height:66px;object-fit:contain;background:var(--card2);border-radius:8px;padding:.45rem;flex-shrink:0;border:1px solid var(--border)}
.cinfo{flex:1;min-width:0}
.cname{font-size:.84rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cprice{font-size:.82rem;color:var(--gold);font-weight:600;margin-top:.2rem}
.qrow{display:flex;align-items:center;gap:.45rem;margin-top:.45rem}
.qb{background:var(--card2);border:1px solid var(--border2);color:var(--text);width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:1rem}
.qb:hover{border-color:var(--gold);color:var(--gold)}
.qn{font-size:.9rem;min-width:22px;text-align:center;font-weight:600}
.qdel{background:none;border:none;color:var(--text3);cursor:pointer;padding:.3rem;border-radius:4px;transition:color .2s;font-size:1.1rem}
.qdel:hover{color:var(--red)}
.ctotal{display:flex;justify-content:space-between;align-items:center;padding:.9rem 0;border-top:1px solid var(--border);margin-top:.4rem}
.ctlbl{font-size:.88rem;color:var(--text2)}
.ctval{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--gold)}

/* AUTH TABS */
.atabs{display:flex;background:var(--bg2);border-radius:10px;padding:.28rem;margin-bottom:1.4rem;gap:.28rem}
.at{flex:1;padding:.58rem;border-radius:8px;font-size:.87rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;background:none;border:none;text-align:center}
.at.on{background:var(--card2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.4)}

/* QUICK VIEW */
.qvl{display:flex;gap:1.3rem}
.qvimg{width:175px;height:175px;object-fit:contain;background:var(--card2);border-radius:10px;padding:.9rem;border:1px solid var(--border);flex-shrink:0}

/* ADMIN */
.adwrap{display:grid;grid-template-columns:225px 1fr;min-height:calc(100vh - 108px)}
.adside{background:var(--card);border-right:1px solid var(--border);padding:1.4rem 1rem}
.adbrand{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--gold);margin-bottom:.2rem}
.adsub{font-size:.71rem;color:var(--text3);margin-bottom:1.4rem;padding-bottom:.9rem;border-bottom:1px solid var(--border)}
.adsi{display:flex;align-items:center;gap:.6rem;padding:.62rem .88rem;border-radius:8px;color:var(--text2);font-size:.84rem;font-weight:500;cursor:pointer;transition:all .2s;background:none;border:none;width:100%;text-align:left;margin-bottom:.18rem}
.adsi:hover,.adsi.on{background:var(--gold-dim);color:var(--gold)}
.adm{padding:1.7rem}
.adc{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.3rem;margin-bottom:1.1rem}
.adct{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:1.1rem}
.strow{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.4rem}
.stc{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:1.1rem;text-align:center}
.stn{font-family:'Playfair Display',serif;font-size:1.85rem;font-weight:700;color:var(--gold)}
.stl{font-size:.74rem;color:var(--text2);margin-top:.18rem}
.orow{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:.95rem 1.1rem;margin-bottom:.75rem;display:flex;align-items:flex-start;gap:.9rem;flex-wrap:wrap}
.ob{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,175,55,.25);padding:.18rem .65rem;border-radius:50px;font-size:.74rem;font-weight:600;white-space:nowrap}
.snew{background:rgba(39,174,96,.1);color:var(--green);border:1px solid rgba(39,174,96,.25);padding:.18rem .65rem;border-radius:50px;font-size:.71rem;font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--card2);border:1px solid var(--border2);padding:.88rem 1.3rem;border-radius:12px;font-size:.86rem;font-weight:500;box-shadow:0 12px 48px rgba(0,0,0,.7);animation:ti .28s;z-index:600;display:flex;align-items:center;gap:.65rem;max-width:310px}
.toast.ok{border-color:rgba(39,174,96,.4)}
.toast.err{border-color:rgba(232,69,60,.35)}
@keyframes ti{from{transform:translateX(110px);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:3.5rem 2rem;color:var(--text2)}
.emico{font-size:2.8rem;margin-bottom:.8rem}

@media(max-width:1100px){
  .hero-sec{grid-template-columns:1fr}
  .hside{flex-direction:row}
  .hscard{min-height:135px}
  .promogrid{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  .topbar{display:none}
  .nbi{flex-wrap:wrap;padding:.7rem 1rem;gap:.6rem}
  .brand{font-size:1.5rem}
  .sw{order:10;max-width:100%;flex:0 0 100%}
  .cat-btn span:last-child{display:none}
  .adwrap{grid-template-columns:1fr}
  .adside{display:none}
  .fr2{grid-template-columns:1fr}
  .strow{grid-template-columns:1fr 1fr}
  .promogrid{grid-template-columns:1fr}
  .main{padding:1rem}
  .catsgrid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr))}
  .qvl{flex-direction:column}
  .qvimg{width:100%;height:180px}
  /* MODAL */
  .mo{border-radius:18px 18px 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%;margin:0;max-height:92vh}
  .ov{align-items:flex-end;padding:0}
  /* NAV */
  .navacts{gap:.05rem}
  .na{padding:.35rem .5rem;font-size:.65rem}
  .na .ni{font-size:1.05rem}
  /* HERO */
  .hside{flex-direction:column}
  .hscard{min-height:110px}
  .stitle{font-size:1.6rem}
  .simg{width:38%}
  /* PRODUCT GRID */
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.65rem}
  .pprice{font-size:1rem}
  .bcart,.bbuy{font-size:.72rem;padding:.45rem .3rem}
  /* HERO SLIDER */
  .hslider{min-height:280px}
  .hslide{padding:1.5rem}
  /* ADMIN */
  .adm{padding:1rem}
  .strow{grid-template-columns:1fr 1fr;gap:.6rem}
  /* CATALOG FILTER */
  .n2l{padding:.55rem .7rem;font-size:.76rem}
}
@media(max-width:480px){
  .pgrid{grid-template-columns:repeat(2,1fr);gap:.55rem}
  .catsgrid{grid-template-columns:repeat(auto-fill,minmax(75px,1fr));gap:.55rem}
  .cico{width:46px;height:46px;font-size:1.2rem}
  .cname{font-size:.7rem}
  .brand{font-size:1.3rem}
  .stit{font-size:1.2rem}
  .hslider{min-height:240px}
  .stitle{font-size:1.35rem}
  .simg{display:none}
  .hsc{max-width:100%}
  .pprice{font-size:.95rem}
  .pname{font-size:.8rem}
  .main{padding:.75rem}
  .mo{border-radius:16px 16px 0 0}
  .strow{grid-template-columns:1fr 1fr}
  .stn{font-size:1.4rem}
}
</style>

function App(){
  const [lang,setLang]=useState(()=>localStorage.getItem('tn_l')||'uz');
  const t=T[lang];
const DATA_VER='v5';
if(localStorage.getItem('tn_ver')!==DATA_VER){localStorage.removeItem('tn_p');localStorage.setItem('tn_ver',DATA_VER);}
  const [prods,setProds]=useState(()=>{try{return JSON.parse(localStorage.getItem('tn_p'))||SEED}catch{return SEED}});
  const [cart,setCart]=useState(()=>{try{return JSON.parse(localStorage.getItem('tn_c'))||[]}catch{return[]}});
  const [wish,setWish]=useState(()=>{try{return JSON.parse(localStorage.getItem('tn_w'))||[]}catch{return[]}});
  const [orders,setOrders]=useState(()=>{try{return JSON.parse(localStorage.getItem('tn_o'))||[]}catch{return[]}});
  const [users,setUsers]=useState(()=>{try{return JSON.parse(localStorage.getItem('tn_us'))||[]}catch{return[]}});
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('tn_u'))||null}catch{return null}});
  const [adminIn,setAdminIn]=useState(()=>sessionStorage.getItem('tn_a')==='1');
  const [page,setPage]=useState('home');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [editPr,setEditPr]=useState(null);
  const [qvProd,setQvProd]=useState(null);
  const [buyProd,setBuyProd]=useState(null);
  const [aCat,setACat]=useState(0);

  useEffect(()=>{localStorage.setItem('tn_l',lang)},[lang]);
  useEffect(()=>{localStorage.setItem('tn_c',JSON.stringify(cart))},[cart]);
  useEffect(()=>{localStorage.setItem('tn_w',JSON.stringify(wish))},[wish]);
  useEffect(()=>{localStorage.setItem('tn_o',JSON.stringify(orders))},[orders]);
  useEffect(()=>{localStorage.setItem('tn_p',JSON.stringify(prods))},[prods]);
  useEffect(()=>{localStorage.setItem('tn_us',JSON.stringify(users))},[users]);

  const showToast=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),2600)};
  const addCart=p=>{setCart(c=>{const e=c.find(i=>i.id===p.id);return e?c.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i):[...c,{...p,qty:1}]});showToast(t.added)};
  const remCart=id=>setCart(c=>c.filter(i=>i.id!==id));
  const adjQty=(id,d)=>setCart(c=>c.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i));
  const clrCart=()=>setCart([]);
  const cTotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const cCount=cart.reduce((s,i)=>s+i.qty,0);
  const togWish=p=>{const h=wish.find(i=>i.id===p.id);setWish(w=>h?w.filter(i=>i.id!==p.id):[...w,p]);if(!h)showToast(t.liked)};
  const isWish=id=>!!wish.find(i=>i.id===id);
  const placeOrder=info=>{setOrders(o=>[{id:Date.now(),customer:info,items:[...cart],total:cTotal,date:new Date().toLocaleString()},...o]);clrCart();showToast(t.ordered);setModal(null)};
  const loginUser=(email,pass)=>{if(email==='dilyorsobirov04@gmail.com'&&pass==='dilyor1234'){setAdminIn(true);sessionStorage.setItem('tn_a','1');setModal(null);setPage('admin');showToast('Xush kelibsiz, Admin!');return}const u=users.find(u=>u.email===email&&u.pass===pass);if(u){setUser(u);localStorage.setItem('tn_u',JSON.stringify(u));setModal(null);showToast('Xush kelibsiz, '+u.name+'!')}else showToast('Xato email yoki parol','err')};
  const regUser=(name,email,pass)=>{if(users.find(u=>u.email===email)){showToast('Bu email allaqachon ro\'yxatdan o\'tgan','err');return}const nu={id:Date.now(),name,email,pass};setUsers(u=>[...u,nu]);setUser(nu);localStorage.setItem('tn_u',JSON.stringify(nu));setModal(null);showToast('Xush kelibsiz, '+name+'!')};
  const logoutUser=()=>{setUser(null);localStorage.removeItem('tn_u');showToast('Chiqildi')};
  const saveProd=p=>{if(p.id)setProds(ps=>ps.map(x=>x.id===p.id?p:x));else setProds(ps=>[...ps,{...p,id:Date.now()}]);showToast(t.saved);setModal(null);setEditPr(null)};
  const delProd=id=>{setProds(ps=>ps.filter(p=>p.id!==id));showToast(t.deleted)};

  const ctx={t,lang,setLang,page,setPage,modal,setModal,showToast,
    prods,saveProd,delProd,editPr,setEditPr,
    cart,addCart,remCart,adjQty,clrCart,cTotal,cCount,
    wish,togWish,isWish,orders,placeOrder,
    user,loginUser,regUser,logoutUser,users,
    adminIn,setAdminIn,aCat,setACat,qvProd,setQvProd,buyProd,setBuyProd};

  return(
    <div>
      <TopBar ctx={ctx}/>
      <Navbar ctx={ctx}/>
      <Nav2 ctx={ctx}/>
      {page==='home'&&<HomePage ctx={ctx}/>}
      {page==='catalog'&&<CatalogPage ctx={ctx}/>}
      {page==='admin'&&<AdminPage ctx={ctx}/>}
      {modal==='cart'&&<CartModal ctx={ctx}/>}
      {modal==='wish'&&<WishModal ctx={ctx}/>}
      {modal==='checkout'&&<CheckoutModal ctx={ctx}/>}
      {modal==='auth'&&<AuthModal ctx={ctx}/>}
      {modal==='alog'&&<AdminLoginMod ctx={ctx}/>}
      {modal==='addp'&&<ProdForm ctx={ctx} prod={null}/>}
      {modal==='editp'&&<ProdForm ctx={ctx} prod={editPr}/>}
      {qvProd&&<QuickView ctx={ctx}/>}
      {buyProd&&<BuyModal ctx={ctx}/>}
      {toast&&<div className={`toast ${toast.type}`}>{toast.type==='ok'?'✓':'✗'} {toast.msg}</div>}
    </div>
  );
}

function TopBar({ctx}){
  const {t,lang,setLang,setPage,setACat}=ctx;
  return(
    <div className="topbar">
      <div className="topbar-left">
        <span>📍 {t.topStore}</span>
        <span>{t.topCorp}</span>
        <span style={{cursor:"pointer"}} onClick={()=>window.open("tolov.html","_blank")}>{t.topPay}</span>
      </div>
      <div className="topbar-right">
        <span>📞 {lang==='uz'?"Aloqa markazi : ":""}<span className="phone" style={{cursor:'pointer'}} onClick={()=>{setPage('catalog');setACat(1)}}>{t.phone}</span></span>
        <div className="lang-sw">
          <button className={`lb ${lang==='uz'?'on':''}`} onClick={()=>setLang('uz')}>UZ</button>
          <button className={`lb ${lang==='ru'?'on':''}`} onClick={()=>setLang('ru')}>RU</button>
        </div>
      </div>
    </div>
  );
}

function Navbar({ctx}){
  const {t,setPage,setModal,cCount,wish,user,logoutUser,adminIn,setACat}=ctx;
  return(
    <div className="navbar">
      <div className="nbi">
        <div className="brand" onClick={()=>setPage('home')}>{t.brand}<span style={{color:'var(--gold)',fontStyle:'normal',fontSize:'1rem',marginLeft:'.05rem'}}>✦</span></div>
        <button className="cat-btn" onClick={()=>{setPage('catalog');setACat(0)}}>
          <span>☰</span> <span>{t.catalog}</span>
        </button>
        <div className="sw">
          <input className="si" placeholder={t.search}/>
          <button className="sb">🔍</button>
        </div>
        <div className="navacts">
          <button className="na" onClick={()=>setModal('wish')}>
            <span className="ni">♡</span><span>{t.wish}</span>
            {wish.length>0&&<span className="nbadge">{wish.length}</span>}
          </button>
          <button className="na" onClick={()=>setModal('cart')}>
            <span className="ni">🛒</span><span>{t.cart}</span>
            {cCount>0&&<span className="nbadge">{cCount}</span>}
          </button>
          {adminIn

    setBuyProd(null);
    showToast(lang==='uz'?"Buyurtma qabul qilindi! ✓":"Заказ принят! ✓");
  };

  const cashP=p.cashPrice||p.price;
  const creditP=p.creditPrice;
  const months=p.creditMonths;

  return(
    <div className="ov">
      <div className="mo" style={{maxWidth:420}}>
        <div className="moh">
          <div className="mot">{step==='choose'?'🛍️ '+(lang==='uz'?"To'lov turini tanlang":"Выберите тип оплаты"):'📋 '+(lang==='uz'?"Buyurtma":"Заказ")}</div>
          <button className="mox" onClick={close}>×</button>
        </div>
        <div className="mob">
          {step==='choose'&&(
            <>
              <div style={{display:'flex',gap:'.6rem',alignItems:'center',background:'var(--bg2)',borderRadius:10,padding:'.75rem',marginBottom:'1.2rem'}}>
                <img src={p.img} alt={nm} style={{width:52,height:52,objectFit:'contain',borderRadius:8,background:'var(--card)',padding:4}} onError={e=>{e.target.style.display='none'}}/>
                <div>
                  <div style={{fontSize:'.82rem',fontWeight:600,lineHeight:1.3}}>{nm}</div>
                  <div style={{fontSize:'.78rem',color:'var(--gold)',fontWeight:700,marginTop:'.2rem'}}>{fmt(cashP)} {t.sum}</div>
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
                <button onClick={()=>goForm('cash')} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(39,174,96,.07)',border:'1.5px solid rgba(39,174,96,.3)',borderRadius:12,padding:'1rem 1.2rem',cursor:'pointer',transition:'all .2s',color:'var(--text)',fontFamily:"'Outfit',sans-serif"}}
                  onMouseOver={e=>e.currentTarget.style.background='rgba(39,174,96,.13)'}
                  onMouseOut={e=>e.currentTarget.style.background='rgba(39,174,96,.07)'}>
                  <div style={{textAlign:'left'}}>
                    <div style={{fontWeight:700,fontSize:'.95rem',color:'#27AE60',marginBottom:'.2rem'}}>💵 {lang==='uz'?"Naqt to'lov":"Наличный расчёт"}</div>
                    <div style={{fontSize:'.8rem',color:'var(--text2)'}}>{fmt(cashP)} {t.sum}</div>
                  </div>
                  <span style={{color:'#27AE60',fontSize:'1.2rem'}}>→</span>
                </button>
                {creditP&&months&&(
                  <button onClick={()=>goForm('credit')} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(212,175,55,.07)',border:'1.5px solid rgba(212,175,55,.25)',borderRadius:12,padding:'1rem 1.2rem',cursor:'pointer',transition:'all .2s',color:'var(--text)',fontFamily:"'Outfit',sans-serif"}}
                    onMouseOver={e=>e.currentTarget.style.background='rgba(212,175,55,.13)'}
                    onMouseOut={e=>e.currentTarget.style.background='rgba(212,175,55,.07)'}>
                    <div style={{textAlign:'left'}}>
                      <div style={{fontWeight:700,fontSize:'.95rem',color:'var(--gold)',marginBottom:'.2rem'}}>💳 {lang==='uz'?"Kredit / Bo'lib to'lash":"Кредит / Рассрочка"}</div>
                      <div style={{fontSize:'.8rem',color:'var(--text2)'}}>{months} {lang==='uz'?"oyga":"мес"} · {fmt(Math.ceil(creditP/months))}/{lang==='uz'?"oy":"мес"}</div>
                    </div>
                    <span style={{color:'var(--gold)',fontSize:'1.2rem'}}>→</span>
                  </button>
                )}
              </div>
            </>
          )}
          {step==='form'&&(
            <>
              <div style={{background:type==='credit'?'rgba(212,175,55,.07)':'rgba(39,174,96,.07)',border:`1px solid ${type==='credit'?'rgba(212,175,55,.2)':'rgba(39,174,96,.2)'}`,borderRadius:9,padding:'.65rem 1rem',marginBottom:'1.1rem',fontSize:'.8rem',color:'var(--text2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>{type==='credit'?(lang==='uz'?"💳 Kredit":"💳 Кредит"):(lang==='uz'?"💵 Naqt":"💵 Наличные")}</span>
                <span style={{color:type==='credit'?'var(--gold)':'#27AE60',fontWeight:700}}>{type==='credit'&&months?`${fmt(Math.ceil((p.creditPrice||p.price)/months))} ${t.sum}/${lang==='uz'?"oy":"мес"}`:`${fmt(cashP)} ${t.sum}`}</span>
              </div>
              <div className="fg"><label className="fl">{lang==='uz'?"Ism Familiya *":"Имя Фамилия *"}</label><input className="fi" value={nm2} onChange={e=>setNm2(e.target.value)} placeholder={lang==='uz'?"Jasur Abdullayev":"Джасур Абдуллаев"}/></div>
              <div className="fg"><label className="fl">{lang==='uz'?"Telefon *":"Телефон *"}</label><input className="fi" value={ph} onChange={e=>setPh(e.target.value)} placeholder="+998 90 123 45 67"/></div>
              <div className="fg"><label className="fl">{lang==='uz'?"Manzil":"Адрес"}</label><input className="fi" value={addr} onChange={e=>setAddr(e.target.value)} placeholder={lang==='uz'?"Toshkent, Chilonzor...":"Ташкент, Чиланзар..."}/></div>
              <div style={{display:'flex',gap:'.65rem',marginTop:'.4rem'}}>
                <button className="bout" style={{flex:1}} onClick={()=>setStep('choose')}>← {lang==='uz'?"Orqaga":"Назад"}</button>
                <button className="bpri" style={{flex:2}} onClick={confirm}>{lang==='uz'?"Tasdiqlash ✓":"Подтвердить ✓"}</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}


function AdminLoginMod({ctx}){
  const {t,setModal,setAdminIn,setPage,showToast}=ctx;
  const [pw,setPw]=useState('');
  const sub=()=>{if(pw==='dilyor1234'){setAdminIn(true);sessionStorage.setItem('tn_a','1');setPage('admin');setModal(null);showToast('Admin paneliga xush kelibsiz!')}else showToast('Noto\'g\'ri parol','err')};
  return(
    <div className="ov">
      <div className="mo" style={{maxWidth:380}}>
        <div className="moh"><div className="mot">🔐 {t.admin}</div><button className="mox" onClick={()=>setModal(null)}>×</button></div>
        <div className="mob">

          <div className="fg"><label className="fl">{t.adminPass}</label><input className="fi" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Parolingizni yozing" onKeyDown={e=>e.key==='Enter'&&sub()}/></div>
          <button className="bpri" style={{width:'100%',padding:'.88rem'}} onClick={sub}>{t.enterAdmin}</button>
        </div>
      </div>
    </div>
  );
}

function ProdForm({ctx,prod}){
  const {t,lang,setModal,saveProd,setEditPr}=ctx;
  const cats=["Smartfonlar","Noutbuklar","Televizorlar","Audio","Planshetlar","Maishiy","Dronlar","Soatlar","Aksessuarlar"];
  const [f,sf]=useState(prod||{nameUz:'',nameRu:'',descUz:'',descRu:'',price:'',oldPrice:'',cat:'Smartfonlar',img:'',badge:'',inst:'',cashPrice:'',creditPrice:'',creditMonths:''});
  const s=(k,v)=>sf(p=>({...p,[k]:v}));
  const sub=()=>{if(!f.nameUz||!f.price){alert('Majburiy maydonlarni to\'ldiring');return}saveProd({...f,price:Number(f.price),oldPrice:f.oldPrice?Number(f.oldPrice):null})};
  const close=()=>{setModal(null);setEditPr(null)};
  return(
    <div className="ov">
      <div className="mo" style={{maxWidth:600}}>
        <div className="moh"><div className="mot">{prod?t.editProd:t.addProd}</div><button className="mox" onClick={close}>×</button></div>
        <div className="mob">
          <div className="fr2">
            <div className="fg"><label className="fl">{t.nameUz} *</label><input className="fi" value={f.nameUz} onChange={e=>s('nameUz',e.target.value)}/></div>
            <div className="fg"><label className="fl">{t.nameRu}</label><input className="fi" value={f.nameRu} onChange={e=>s('nameRu',e.target.value)}/></div>
          </div>
          <div className="fg"><label className="fl">{t.descUz}</label><textarea className="fi" value={f.descUz} onChange={e=>s('descUz',e.target.value)}/></div>
          <div className="fg"><label className="fl">{t.descRu}</label><textarea className="fi" value={f.descRu} onChange={e=>s('descRu',e.target.value)}/></div>
          <div className="fr2">
            <div className="fg"><label className="fl">{t.priceFld} *</label><input className="fi" type="number" value={f.price} onChange={e=>s('price',e.target.value)}/></div>
            <div className="fg"><label className="fl">{t.oldPriceFld}</label><input className="fi" type="number" value={f.oldPrice||''} onChange={e=>s('oldPrice',e.target.value)}/></div>
          </div>
          <div className="fr2">
            <div className="fg"><label className="fl">{t.catFld}</label>
              <select className="fi" value={f.cat} onChange={e=>s('cat',e.target.value)}>
                {cats.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="fg"><label className="fl">{t.badgeFld} (NEW/HOT/SALE)</label><input className="fi" value={f.badge} onChange={e=>s('badge',e.target.value)} placeholder="NEW"/></div>
          </div>
          <div className="fg"><label className="fl">{t.imgFld}</label><input className="fi" value={f.img} onChange={e=>s('img',e.target.value)} placeholder="https://..."/></div>
          <div style={{background:'rgba(212,175,55,.05)',border:'1px solid rgba(212,175,55,.15)',borderRadius:10,padding:'1rem',marginBottom:'1rem'}}>
            <div style={{fontSize:'.78rem',color:'var(--gold)',fontWeight:600,marginBottom:'.75rem',letterSpacing:'.06em',textTransform:'uppercase'}}>💳 Kredit / Bo'lib to'lash</div>
            <div className="fr2" style={{marginBottom:'.75rem'}}>
              <div className="fg" style={{marginBottom:0}}><label className="fl">Naqt narxi (so'm)</label><input className="fi" type="number" value={f.cashPrice||''} onChange={e=>s('cashPrice',e.target.value)} placeholder="Masalan: 13990000"/></div>
              <div className="fg" style={{marginBottom:0}}><label className="fl">Kredit narxi (so'm)</label><input className="fi" type="number" value={f.creditPrice||''} onChange={e=>s('creditPrice',e.target.value)} placeholder="Masalan: 14500000"/></div>
            </div>
            <div className="fr2">
              <div className="fg" style={{marginBottom:0}}><label className="fl">Oylar soni</label><input className="fi" type="number" value={f.creditMonths||''} onChange={e=>s('creditMonths',e.target.value)} placeholder="Masalan: 12"/></div>
              <div className="fg" style={{marginBottom:0}}><label className="fl">Oylik to'lov (avtohisob)</label><input className="fi" value={f.creditMonths&&f.creditPrice?(fmt(Math.ceil(Number(f.creditPrice)/Number(f.creditMonths)))+String.fromCharCode(32)+"so'm"):""}  readOnly placeholder="Oylar va narx kiritilganda hisoblanadi" style={{color:'var(--gold)',background:'var(--bg)'}}/></div>
            </div>
          </div>
          <div style={{display:'flex',gap:'.75rem',marginTop:'.5rem'}}>
            <button className="bout" style={{flex:1}} onClick={close}>{t.cancel}</button>
            <button className="bpri" style={{flex:2}} onClick={sub}>{t.save}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AdminPage({ctx}){
  const {t,lang,prods,orders,users,setModal,setEditPr,delProd,adminIn,setAdminIn,setPage,showToast}=ctx;
  const [tab,setTab]=useState('dashboard');
  if(!adminIn)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh',flexDirection:'column',gap:'1rem'}}>
      <p style={{color:'var(--text2)'}}>{lang==='uz'?"Admin paneliga kirish uchun":"Для входа в панель администратора"}</p>
      <button className="bpri" onClick={()=>setModal('alog')}>🔐 {t.enterAdmin}</button>
    </div>
  );
  const totalRev=orders.reduce((s,o)=>s+o.total,0);
  const doLogout=()=>{setAdminIn(false);sessionStorage.removeItem('tn_a');setPage('home');showToast('Admin chiqdi')};
  const menu=[{k:'dashboard',i:'📊',l:t.dashboard},{k:'inventory',i:'📦',l:t.inventory},{k:'orders',i:'📋',l:t.orders}];
  return(
    <div className="adwrap">
      <aside className="adside">
        <div className="adbrand">{t.brand} ✦</div>
        <div className="adsub">Admin Panel v2.0</div>
        {menu.map(m=><button key={m.k} className={`adsi ${tab===m.k?'on':''}`} onClick={()=>setTab(m.k)}>{m.i} {m.l}</button>)}
        <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'1rem 0'}}/>
        <button className="adsi" onClick={doLogout} style={{color:'#E8453C'}}>🚪 {t.logout}</button>
      </aside>
      <main className="adm">
        {tab==='dashboard'&&(
          <>
            <h2 style={{fontFamily:'Playfair Display',fontSize:'1.45rem',marginBottom:'1.4rem'}}>📊 {t.dashboard}</h2>
            <div className="strow">
              <div className="stc"><div className="stn">{prods.length}</div><div className="stl">{lang==='uz'?"Mahsulotlar":"Товары"}</div></div>
              <div className="stc"><div className="stn">{orders.length}</div><div className="stl">{t.orders}</div></div>
              <div className="stc"><div className="stn">{users.length}</div><div className="stl">{lang==='uz'?"Foydalanuvchilar":"Пользователи"}</div></div>
              <div className="stc"><div className="stn" style={{fontSize:'1.35rem'}}>{fmt(totalRev)}</div><div className="stl">{lang==='uz'?"Jami daromad":"Общий доход"}</div></div>
            </div>
            <div className="adc">
              <div className="adct">🔥 {lang==='uz'?"So'nggi buyurtmalar":"Последние заказы"}</div>
              {orders.slice(0,4).map(o=>(
                <div className="orow" key={o.id}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600}}>{o.customer.name}</div>
                    <div style={{fontSize:'.79rem',color:'var(--text2)',marginTop:'.18rem'}}>📞 {o.customer.phone} · {o.date}</div>
                    <div style={{fontSize:'.79rem',color:'var(--text3)'}}>📍 {o.customer.addr}</div>
                  </div>
                  <span className="ob">{fmt(o.total)} {t.sum}</span>
                  <span className="snew">{lang==='uz'?"Yangi":"Новый"}</span>
                </div>
              ))}
              {orders.length===0&&<div className="empty" style={{padding:'2rem'}}><div className="emico">📋</div></div>}
            </div>
          </>
        )}
        {tab==='inventory'&&(
          <>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.4rem'}}>
              <h2 style={{fontFamily:'Playfair Display',fontSize:'1.45rem'}}>📦 {t.inventory}</h2>
              <button className="bpri" onClick={()=>setModal('addp')}>+ {t.addProd}</button>
            </div>
            <div className="pgrid">
              {prods.map(p=><PCard key={p.id} p={p} ctx={ctx} isAdmin onEdit={p=>{ctx.setEditPr(p);setModal('editp')}} onDelete={delProd}/>)}
            </div>
          </>
        )}
        {tab==='orders'&&(
          <>
            <h2 style={{fontFamily:'Playfair Display',fontSize:'1.45rem',marginBottom:'1.4rem'}}>📋 {t.orders} ({orders.length})</h2>
            {orders.length===0
              ?<div className="empty"><div className="emico">📋</div><p>{lang==='uz'?"Hozircha buyurtma yo'q":"Заказов пока нет"}</p></div>
              :orders.map(o=>(
                <div className="adc" key={o.id} style={{marginBottom:'1rem'}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:'.75rem',marginBottom:'.9rem'}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:'1rem'}}>{o.customer.name}</div>
                      <div style={{fontSize:'.8rem',color:'var(--text2)',marginTop:'.18rem'}}>📞 {o.customer.phone}</div>
                      <div style={{fontSize:'.8rem',color:'var(--text2)'}}>📍 {o.customer.addr}</div>
                      <div style={{fontSize:'.74rem',color:'var(--text3)',marginTop:'.2rem'}}>🕐 {o.date}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:'Playfair Display',color:'var(--gold)',fontWeight:700,fontSize:'1.25rem'}}>{fmt(o.total)} {t.sum}</div>
                      <span className="snew" style={{marginTop:'.3rem',display:'inline-block'}}>{lang==='uz'?"Yangi":"Новый"}</span>
                    </div>
                  </div>
                  <hr style={{border:'none',borderTop:'1px solid var(--border)',margin:'.4rem 0 .75rem'}}/>
                  <div style={{display:'flex',gap:'.45rem',flexWrap:'wrap'}}>
                    {o.items.map(item=>(
                      <div key={item.id} style={{display:'flex',alignItems:'center',gap:'.45rem',background:'var(--bg2)',border:'1px solid var(--border)',padding:'.3rem .75rem',borderRadius:7,fontSize:'.77rem'}}>
                        <img src={item.img} alt="" style={{width:26,height:26,objectFit:'contain',background:'var(--card)',borderRadius:4}} onError={e=>{e.target.src='https://via.placeholder.com/300x300/1C1C1C/D4AF37?text=📱'}}/>
                        <span>{lang==='uz'?item.nameUz:item.nameRu}</span>
                        <span style={{color:'var(--gold)',fontWeight:600}}>×{item.qty}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))
            }
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
